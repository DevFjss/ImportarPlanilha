<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>FAED - Visualizador</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* PAGINA */

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#eef3ff;
}

/* MENU LATERAL */

.sidebar{
width:380px;
background:#0b4ec2;
color:white;
padding:25px;
box-shadow:4px 0 10px rgba(0,0,0,0.2);
}

.logo{
font-size:26px;
margin-bottom:30px;
font-weight:bold;
}

.menu-item{

width:100%;
padding:15px;
margin:10px 0;
border:none;
background:#1b66e3;
color:white;
cursor:pointer;
text-align:left;
font-size:18px;
border-radius:6px;
}

.menu-item:hover{
background:#2f7df7;
}

/* AREA DIREITA */

.main-content{
flex:1;
padding:20px;
overflow:auto;
}

/* TABELA */

.table-container{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

table{
border-collapse:collapse;
width:100%;
font-size:14px;
}

/* CABECALHO */

th{
background:#0b4ec2;
color:white;
padding:10px;
text-align:left;
position:relative;
}

/* LINHAS */

td{
padding:8px;
border-bottom:1px solid #ddd;
}

/* COLUNAS NUMERICAS */

.numero{
background:#f0f6ff;
text-align:right;
font-weight:bold;
}

/* LINHAS ALTERNADAS */

tr:nth-child(even){
background:#fafafa;
}

/* RESIZE */

.resize-handle{
position:absolute;
right:0;
top:0;
width:6px;
height:100%;
cursor:col-resize;
}

</style>

</head>

<body>

<!-- MENU -->

<div class="sidebar">

<div class="logo">
Sistema FAED
</div>

<button class="menu-item" onclick="carregarPNAE()">
PNAE
</button>

</div>

<!-- CONTEUDO -->

<div class="main-content">

<h2>PNAE</h2>

<div class="table-container">

<div id="tabela-container">
Clique em PNAE para carregar a planilha
</div>

</div>

</div>

<script>

const URL_PLANILHA =
"https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_PNAE_2026.xlsx";

const container =
document.getElementById("tabela-container");

/* CARREGAR PLANILHA */

async function carregarPNAE(){

container.innerHTML="Carregando planilha...";

const resposta = await fetch(URL_PLANILHA);

const buffer = await resposta.arrayBuffer();

const workbook = XLSX.read(buffer);

const sheet = workbook.Sheets[workbook.SheetNames[0]];

const dados = XLSX.utils.sheet_to_json(sheet,{header:1});

gerarTabela(dados);

}

/* LOCALIZAR CABECALHO */

function localizarCabecalho(dados){

for(let i=0;i<dados.length;i++){

for(let j=0;j<dados[i].length;j++){

if(dados[i][j]){

let texto = dados[i][j].toString().toUpperCase();

if(texto.includes("NTE")){

return i;

}

}

}

}

return 0;

}

/* FORMATAR NUMERO */

function formatarNumero(valor){

if(typeof valor === "number"){

return valor.toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

}

return valor;

}

/* GERAR TABELA */

function gerarTabela(dados){

let linhaCab = localizarCabecalho(dados);

let tabela = document.createElement("table");

let thead = document.createElement("thead");

let trHead = document.createElement("tr");

/* CABECALHO */

dados[linhaCab].forEach(col=>{

let th = document.createElement("th");

th.textContent = col;

/* RESIZE */

let resize = document.createElement("div");

resize.className="resize-handle";

resize.addEventListener("mousedown",initResize);

th.appendChild(resize);

trHead.appendChild(th);

});

thead.appendChild(trHead);

tabela.appendChild(thead);

/* DADOS */

let tbody = document.createElement("tbody");

for(let i=linhaCab+1;i<dados.length;i++){

let tr = document.createElement("tr");

dados[i].forEach(valor=>{

let td = document.createElement("td");

if(typeof valor === "number"){

td.classList.add("numero");

td.textContent = formatarNumero(valor);

}else{

td.textContent = valor;

}

tr.appendChild(td);

});

tbody.appendChild(tr);

}

tabela.appendChild(tbody);

container.innerHTML="";

container.appendChild(tabela);

}

/* REDIMENSIONAR COLUNA */

let col;
let startX;
let startWidth;

function initResize(e){

col = e.target.parentElement;

startX = e.pageX;

startWidth = col.offsetWidth;

document.addEventListener("mousemove",resizeCol);

document.addEventListener("mouseup",stopResize);

}

function resizeCol(e){

col.style.width = startWidth + (e.pageX-startX) + "px";

}

function stopResize(){

document.removeEventListener("mousemove",resizeCol);

document.removeEventListener("mouseup",stopResize);

}

</script>

</body>
</html>
