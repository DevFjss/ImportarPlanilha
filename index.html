<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPASSE CDF - Visualizador de Planilhas</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #f0f4fc;
            overflow: hidden;
        }
        
               /* MENU LATERAL - LARGURA REDUZIDA */
        .sidebar {
            width: 280px;  /* Antes era 380px ou 400px */
            background: #0a3a9e;
            color: white;
            padding: 30px 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* LOGO - FONTE REDUZIDA */
        .logo {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 40px;
            padding-left: 10px;
            border-left: 5px solid #ffd700;
        }

                /* BOTÕES DO MENU - REDUZIDOS */
        .menu-item {
            width: 100%;
            padding: 12px 15px;  /* Antes era 18px 20px */
            margin: 6px 0;       /* Antes era 8px 0 */
            border: none;
            background: #1e4fc4;
            color: white;
            cursor: pointer;
            text-align: left;
            font-size: 16px;     /* Antes era 20px */
            font-weight: 500;
            border-radius: 8px;   /* Antes era 12px */
            transition: all 0.3s;
        }

        .menu-item:hover {
            background: #2f66e0;
            transform: translateX(5px);
        }

        /* AREA PRINCIPAL */
        .main-content {
            flex: 1;
            padding: 25px;
            overflow: auto;
            height: 100vh;
        }

        .main-content h2 {
            color: #0a3a9e;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 600;
        }

        /* CONTAINER DA TABELA */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            overflow: auto;
            max-height: calc(100vh - 140px);
        }

        /* TABELA */
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
            table-layout: auto;
        }

        /* CABEÇALHO AZUL */
        th {
            background: #0a3a9e;
            color: white;
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            position: relative;
            user-select: none;
            white-space: nowrap;
            border-right: 1px solid #2f66e0;
        }

        th:last-child {
            border-right: none;
        }

        /* LINHAS */
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e7f0;
            white-space: nowrap;
        }

        /* COLUNAS DE VALORES - FORMATO BR */
        td.valor {
            background: #f0f6ff;
            text-align: right;
            font-weight: 600;
            color: #0a3a9e;
            font-family: 'Courier New', monospace;
        }

        /* COLUNAS IDENTIFICADOR - SEM FORMATAÇÃO */
        td.identificador {
            text-align: left;
            font-weight: 400;
            color: #333;
        }

        /* LINHAS ALTERNADAS */
        tbody tr:nth-child(even) {
            background: #f8faff;
        }

        tbody tr:hover {
            background: #e8f0fe;
        }

        /* RESIZE HANDLE */
        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
            z-index: 10;
        }

        .resize-handle:hover,
        .resize-handle:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* MENSAGEM INICIAL */
        .mensagem-inicial {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 18px;
            background: #f5f9ff;
            border-radius: 10px;
            border: 2px dashed #0a3a9e;
        }

        .carregando {
            text-align: center;
            padding: 40px;
            color: #0a3a9e;
            font-size: 18px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- MENU LATERAL -->
    <div class="sidebar">
        <div class="logo">
            📊 Repasses - CDF
        </div>
        
        <button class="menu-item" onclick="carregarPNAE()">
            📁 PNAE 2026
        </button>
        
        <button class="menu-item" onclick="carregarFAED()">
        📁 FAED 2026
    </button>

         <button class="menu-item" onclick="carregarMANUTENCAO()">
        🔧 Gerador Manutenção 2026
    </button>
        
        <div style="margin-top: auto; font-size: 14px; opacity: 0.7; padding: 20px 10px;">
            Clique para carregar a planilha<br>
            Arraste as bordas para redimensionar
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">
        <h2>📋 Visualizar repasses</h2>
        
        <div class="table-container">
            <div id="tabela-container" class="mensagem-inicial">
                👈 Clique em "PNAE 2026" para carregar a planilha
            </div>
        </div>
    </div>

    <script>
        const URL_PLANILHA = "https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_PNAE_2026.xlsx";
        const container = document.getElementById("tabela-container");

        // Variáveis para redimensionamento
        let colunaAtual = null;
        let mouseXInicial = 0;
        let larguraInicial = 0;

        // LISTA FIXA DE COLUNAS QUE NÃO DEVEM SER FORMATADAS (identificadores)
        const COLUNAS_SEM_FORMATACAO = [
            'Nº', 'NTE', 'CODIGO SEC', 'CODIGO INEP', 'Nº CARTÃO', 'CPF',
            'CODIGO', 'CÓDIGO', 'NUMERO', 'NÚMERO', 'CARTÃO'
        ];

        async function carregarPNAE() {
            try {
                container.innerHTML = '<div class="carregando">🔄 Carregando planilha...</div>';
                
                const resposta = await fetch(URL_PLANILHA);
                
                if (!resposta.ok) {
                    throw new Error("Erro ao carregar arquivo");
                }
                
                const buffer = await resposta.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                const primeiraAba = workbook.SheetNames[0];
                const sheet = workbook.Sheets[primeiraAba];
                
                const dados = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                
                processarEExibirTabela(dados);
                
            } catch (erro) {
                container.innerHTML = `<div class="mensagem-inicial" style="color: #d32f2f;">
                    ❌ Erro: ${erro.message}
                </div>`;
            }
        }
                    // URL da nova planilha FAED
                    const URL_PLANILHA_FAED = "https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_FAED_2026.xlsx";
                    
                    // Função para carregar planilha FAED
                    async function carregarFAED() {
                        try {
                            container.innerHTML = '<div class="carregando">🔄 Carregando planilha FAED...</div>';
                            
                            const resposta = await fetch(URL_PLANILHA_FAED);
                            
                            if (!resposta.ok) {
                                throw new Error("Erro ao carregar arquivo FAED");
                            }
                            
                            const buffer = await resposta.arrayBuffer();
                            const workbook = XLSX.read(buffer, { type: 'array' });
                            const primeiraAba = workbook.SheetNames[0];
                            const sheet = workbook.Sheets[primeiraAba];
                            
                            const dados = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                            
                            // Usa a MESMA função de processamento
                            processarEExibirTabela(dados);
                            
                            // Opcional: muda o título
                            document.querySelector('.main-content h2').textContent = '📋 Visualizador FAED 2026';
                            
                        } catch (erro) {
                            container.innerHTML = `<div class="mensagem-inicial" style="color: #d32f2f;">
                                ❌ Erro ao carregar FAED: ${erro.message}
                            </div>`;
                        }
                    }

      // URL da planilha de Manutenção
const URL_PLANILHA_MANUTENCAO = "https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/GERADOR_REMESSA_CARTÃO_MANUTENÇÃO_2026.xlsm";

// Função para carregar planilha de Manutenção - ABA ESPECÍFICA
async function carregarMANUTENCAO() {
    try {
        container.innerHTML = '<div class="carregando">🔄 Carregando planilha Manutenção (Backup_Remessa)...</div>';
        
        const resposta = await fetch(URL_PLANILHA_MANUTENCAO);
        
        if (!resposta.ok) {
            throw new Error("Erro ao carregar arquivo de Manutenção");
        }
        
        const buffer = await resposta.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: 'array' });
        
        // VERIFICA SE A ABA "Backup_Remessa" EXISTE
        const nomeAbaDesejada = "Backup_Remessa";
        const abaEncontrada = workbook.SheetNames.find(nome => 
            nome.toUpperCase() === nomeAbaDesejada.toUpperCase() || 
            nome.includes("Backup") || 
            nome.includes("REMESSA")
        );
        
        if (!abaEncontrada) {
            // Se não encontrar a aba específica, mostra as abas disponíveis
            const abasDisponiveis = workbook.SheetNames.join(', ');
            throw new Error(`Aba "${nomeAbaDesejada}" não encontrada. Abas disponíveis: ${abasDisponiveis}`);
        }
        
        // PEGA A ABA ENCONTRADA
        const sheet = workbook.Sheets[abaEncontrada];
        const dados = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        
        // Mostra qual aba está sendo carregada
        console.log(`Carregando aba: ${abaEncontrada}`);
        
        // Usa a função de processamento
        processarEExibirTabela(dados);
        
        // Muda o título
        document.querySelector('.main-content h2').textContent = '🔧 Manutenção - Backup_Remessa';
        
        // Opcional: mostra status com nome da aba
        const statusInfo = document.getElementById("status-info");
        if (statusInfo) {
            statusInfo.textContent = `📊 Aba: ${abaEncontrada} | ${dados.length} linhas`;
        }
        
    } catch (erro) {
        container.innerHTML = `<div class="mensagem-inicial" style="color: #d32f2f;">
            ❌ Erro ao carregar Manutenção: ${erro.message}
        </div>`;
    }
}
        // LOCALIZAR LINHA DO CABEÇALHO (procura por NTE)
        function localizarLinhaCabecalho(dados) {
            for (let i = 0; i < Math.min(20, dados.length); i++) {
                const linha = dados[i] || [];
                
                for (let j = 0; j < linha.length; j++) {
                    const celula = linha[j];
                    
                    if (celula && typeof celula === 'string') {
                        const texto = celula.toString().toUpperCase().trim();
                        
                        if (texto.includes('NTE') || texto.includes('Nº') || texto.includes('CPF')) {
                            return i;
                        }
                    }
                }
            }
            return 0;
        }

        // VERIFICAR SE COLUNA DEVE SER IDENTIFICADOR (SEM FORMATAÇÃO)
        function colunaEhIdentificador(textoCabecalho) {
            if (!textoCabecalho) return false;
            
            const texto = textoCabecalho.toString().toUpperCase().trim();
            
            return COLUNAS_SEM_FORMATACAO.some(palavra => {
                return texto.includes(palavra) || texto.includes(palavra.replace(' ', ''));
            });
        }

        // FORMATAR NÚMERO NO PADRÃO BRASILEIRO
        function formatarNumeroBR(valor) {
            if (valor === null || valor === undefined) return '';
            
            const numero = Number(valor);
            if (isNaN(numero)) return valor;
            
            return numero.toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        // PROCESSAR E CRIAR TABELA
        function processarEExibirTabela(dados) {
            if (!dados || dados.length === 0) {
                container.innerHTML = '<div class="mensagem-inicial">⚠️ Planilha vazia</div>';
                return;
            }

            // Localiza cabeçalho
            const linhaCabecalho = localizarLinhaCabecalho(dados);
            const cabecalho = dados[linhaCabecalho] || [];
            
            // Identifica colunas que NÃO devem ser formatadas
            const colunasIdentificador = [];
            cabecalho.forEach((texto, index) => {
                if (colunaEhIdentificador(texto)) {
                    colunasIdentificador.push(index);
                }
            });
            
            // Cria tabela
            const tabela = document.createElement("table");
            
            // CABEÇALHO
            const thead = document.createElement("thead");
            const trHead = document.createElement("tr");
            
            cabecalho.forEach((texto, index) => {
                const th = document.createElement("th");
                th.textContent = texto || `Coluna ${index + 1}`;
                th.style.width = '150px'; // Largura inicial
                
                // Handle para redimensionar
                const handle = document.createElement("div");
                handle.className = "resize-handle";
                handle.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    iniciarRedimensionamento(e, th);
                });
                
                th.appendChild(handle);
                trHead.appendChild(th);
            });
            
            thead.appendChild(trHead);
            tabela.appendChild(thead);
            
            // CORPO DA TABELA
            const tbody = document.createElement("tbody");
            
            for (let i = linhaCabecalho + 1; i < dados.length; i++) {
                const linha = dados[i];
                
                if (!linha || linha.every(celula => celula === undefined || celula === '')) {
                    continue;
                }
                
                const tr = document.createElement("tr");
                
                cabecalho.forEach((_, index) => {
                    const valor = linha[index] !== undefined ? linha[index] : '';
                    const td = document.createElement("td");
                    
                    // REGRA PRINCIPAL:
                    // Se é coluna identificador (lista fixa) → SEM formatação
                    // Se é número e NÃO é identificador → formata como valor
                    if (colunasIdentificador.includes(index)) {
                        // Coluna da lista: Nº, NTE, código, CPF etc - sem formatação
                        td.classList.add("identificador");
                        td.textContent = valor;
                    } 
                    else if (typeof valor === 'number') {
                        // É número e não é identificador → formata como valor
                        td.classList.add("valor");
                        td.textContent = formatarNumeroBR(valor);
                    }
                    else {
                        // Texto normal
                        td.textContent = valor;
                    }
                    
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            }
            
            tabela.appendChild(tbody);
            
            // Atualiza container
            container.innerHTML = '';
            container.appendChild(tabela);
            
            console.log("Tabela gerada:", {
                linhaCabecalho,
                colunasIdentificador,
                totalLinhas: tbody.children.length
            });
        }

        // FUNÇÕES DE REDIMENSIONAMENTO
        function iniciarRedimensionamento(e, elemento) {
            colunaAtual = elemento;
            mouseXInicial = e.pageX;
            larguraInicial = elemento.offsetWidth;
            
            document.addEventListener("mousemove", duranteRedimensionamento);
            document.addEventListener("mouseup", pararRedimensionamento);
            
            document.body.style.cursor = "col-resize";
        }

        function duranteRedimensionamento(e) {
            if (!colunaAtual) return;
            
            const diffX = e.pageX - mouseXInicial;
            const novaWidth = Math.max(80, larguraInicial + diffX);
            
            colunaAtual.style.width = novaWidth + 'px';
        }

        function pararRedimensionamento() {
            document.removeEventListener("mousemove", duranteRedimensionamento);
            document.removeEventListener("mouseup", pararRedimensionamento);
            document.body.style.cursor = "";
            colunaAtual = null;
        }

        window.carregarPNAE = carregarPNAE;
    </script>
</body>
</html>
