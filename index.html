<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>FAED - Visualizador</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#667eea;
}

.sidebar{
width:260px;
background:#2d2d2d;
color:white;
padding:20px;
}

.menu-item{
display:block;
width:100%;
padding:12px;
margin:6px 0;
border:none;
background:none;
color:white;
cursor:pointer;
text-align:left;
}

.menu-item:hover{
background:#444;
}

.main-content{
flex:1;
padding:20px;
background:#f4f4f4;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#667eea;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ccc;
}

</style>

</head>

<body>

<div class="sidebar">

<button class="menu-item" onclick="carregarAba('faed')">
<i class="fas fa-table"></i> faed
</button>

<button class="menu-item" onclick="carregarAba('pnae')">
<i class="fas fa-book-open"></i> pnae
</button>

<button class="menu-item" onclick="carregarAba('saldo')">
<i class="fas fa-coins"></i> saldo manutenção
</button>

</div>

<div class="main-content">

<h2 id="nome-aba">Tabela</h2>

<div id="tabela-container">
Clique em um menu
</div>

</div>

<script>

const REPO_BASE =
"https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_PNAE_2026.xlsx";

// =============================
// MAPA DAS PLANILHAS
// =============================

const MAPA_ABAS = {

pnae:{
nomeExibicao:"PNAE",
icone:"fa-book-open",
arquivo:"minha-pasta/pnae.xlsx"
},

// deixe aberto para adicionar depois

faed:{
nomeExibicao:"FAED",
icone:"fa-table",
arquivo:"minha-pasta/faed.xlsx"
},

saldo:{
nomeExibicao:"SALDO MANUTENÇÃO",
icone:"fa-coins",
arquivo:"minha-pasta/saldo.xlsx"
}

};

const container =
document.getElementById("tabela-container");

const titulo =
document.getElementById("nome-aba");

// =============================
// CARREGAR ABA
// =============================

async function carregarAba(chave){

const config = MAPA_ABAS[chave];

if(!config){

container.innerHTML="Aba não configurada";

return;

}

titulo.innerText = config.nomeExibicao;

container.innerHTML="Carregando planilha...";

const url =
REPO_BASE + config.arquivo;

try{

const resposta =
await fetch(url);

const data =
await resposta.arrayBuffer();

const workbook =
XLSX.read(data);

const sheet =
workbook.Sheets[workbook.SheetNames[0]];

const dados =
XLSX.utils.sheet_to_json(sheet,{header:1});

gerarTabela(dados);

}catch(e){

container.innerHTML="Erro ao carregar planilha";

console.log(e);

}

}

// =============================
// GERAR TABELA
// =============================

function gerarTabela(dados){

const tabela =
document.createElement("table");

const thead =
document.createElement("thead");

const trHead =
document.createElement("tr");

dados[0].forEach(col=>{

const th =
document.createElement("th");

th.textContent = col;

trHead.appendChild(th);

});

thead.appendChild(trHead);

tabela.appendChild(thead);

const tbody =
document.createElement("tbody");

for(let i=1;i<dados.length;i++){

const tr =
document.createElement("tr");

dados[i].forEach(col=>{

const td =
document.createElement("td");

td.textContent = col;

tr.appendChild(td);

});

tbody.appendChild(tr);

}

tabela.appendChild(tbody);

container.innerHTML="";

container.appendChild(tabela);

}

</script>

</body>
</html>
