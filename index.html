<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAED - Visualizador de Planilhas</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #f0f4fc;
        }

        /* MENU LATERAL - AZUL MAIS LARGO */
        .sidebar {
            width: 400px;
            background: #0a3a9e;
            color: white;
            padding: 30px 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            padding-left: 10px;
            border-left: 5px solid #ffd700;
        }

        .menu-item {
            width: 100%;
            padding: 18px 20px;
            margin: 8px 0;
            border: none;
            background: #1e4fc4;
            color: white;
            cursor: pointer;
            text-align: left;
            font-size: 20px;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-item:hover {
            background: #2f66e0;
            transform: translateX(5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* AREA PRINCIPAL */
        .main-content {
            flex: 1;
            padding: 25px;
            overflow: auto;
        }

        .main-content h2 {
            color: #0a3a9e;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 600;
        }

        /* CONTAINER DA TABELA */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            overflow-x: auto;
        }

        /* TABELA */
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
            min-width: 800px;
        }

        /* CABEÇALHO AZUL */
        th {
            background: #0a3a9e;
            color: white;
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            position: relative;
            user-select: none;
            white-space: nowrap;
            border-right: 1px solid #2f66e0;
        }

        th:last-child {
            border-right: none;
        }

        /* LINHAS */
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e7f0;
            white-space: nowrap;
        }

        /* COLUNAS DE VALORES - FORMATO BR (apenas valores monetários) */
        td.valor-moeda {
            background: #f0f6ff;
            text-align: right;
            font-weight: 600;
            color: #0a3a9e;
            font-family: 'Courier New', monospace;
        }

        /* COLUNAS DE IDENTIFICADOR (Nº, NTE, código, CPF) - SEM FORMATAÇÃO */
        td.identificador {
            text-align: left;
            font-weight: 400;
            color: #333;
            background: transparent;
        }

        /* LINHAS ALTERNADAS */
        tbody tr:nth-child(even) {
            background: #f8faff;
        }

        tbody tr:hover {
            background: #e8f0fe;
        }

        /* RESIZE HANDLE */
        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
        }

        .resize-handle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .resize-handle:active {
            background: rgba(255, 255, 255, 0.5);
        }

        /* MENSAGEM INICIAL */
        .mensagem-inicial {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 18px;
            background: #f5f9ff;
            border-radius: 10px;
            border: 2px dashed #0a3a9e;
        }

        /* CARREGANDO */
        .carregando {
            text-align: center;
            padding: 40px;
            color: #0a3a9e;
            font-size: 18px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- MENU LATERAL -->
    <div class="sidebar">
        <div class="logo">
            📊 FAED <br>Sistema
        </div>
        
        <button class="menu-item" onclick="carregarPNAE()">
            📁 PNAE 2026
        </button>
        
        <div style="margin-top: auto; font-size: 14px; opacity: 0.7; padding: 20px 10px;">
            Clique no menu para carregar<br>a planilha com cabeçalho automático
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">
        <h2>📋 Visualizador PNAE</h2>
        
        <div class="table-container">
            <div id="tabela-container" class="mensagem-inicial">
                👈 Clique em "PNAE 2026" no menu lateral<br>
                para carregar a planilha
            </div>
        </div>
    </div>

    <script>
        const URL_PLANILHA = "https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_PNAE_2026.xlsx";
        const container = document.getElementById("tabela-container");

        // Variáveis para redimensionamento
        let colunaAtual = null;
        let mouseXInicial = 0;
        let larguraInicial = 0;

        // Palavras-chave para identificar colunas que NÃO devem ser formatadas como número
        const COLUNAS_IDENTIFICADOR = [
            'Nº', 'NTE', 'CODIGO SEC', 'CODIGO INEP', 'Nº CARTÃO', 'CPF',
            'COD.', 'CÓDIGO', 'COD', 'NUMERO', 'NÚMERO', 'ID', 'IDENTIFICADOR',
            'DOCUMENTO', 'MATRÍCULA', 'REGISTRO'
        ];

        // Função principal para carregar planilha
        async function carregarPNAE() {
            try {
                container.innerHTML = '<div class="carregando">🔄 Carregando planilha...</div>';
                
                const resposta = await fetch(URL_PLANILHA);
                
                if (!resposta.ok) {
                    throw new Error("Erro ao carregar arquivo");
                }
                
                const buffer = await resposta.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                const primeiraAba = workbook.SheetNames[0];
                const sheet = workbook.Sheets[primeiraAba];
                
                // Converte para array 2D
                const dados = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                
                // Processa e exibe a tabela
                processarEExibirTabela(dados);
                
            } catch (erro) {
                container.innerHTML = `<div class="mensagem-inicial" style="color: #d32f2f;">
                    ❌ Erro ao carregar: ${erro.message}<br>
                    <small>Verifique se o arquivo está acessível</small>
                </div>`;
                console.error(erro);
            }
        }

        // LOCALIZAR LINHA DO CABEÇALHO (procura por "NTE")
        function localizarLinhaCabecalho(dados) {
            for (let i = 0; i < Math.min(30, dados.length); i++) {
                const linha = dados[i] || [];
                
                for (let j = 0; j < linha.length; j++) {
                    const celula = linha[j];
                    
                    if (celula && typeof celula === 'string') {
                        const texto = celula.toString().toUpperCase().trim();
                        
                        // Procura por palavras-chave de cabeçalho
                        if (texto.includes('NTE') || 
                            texto.includes('Nº') || 
                            texto.includes('CODIGO') || 
                            texto.includes('CÓDIGO') ||
                            texto.includes('MUNICÍPIO') ||
                            texto.includes('CPF')) {
                            console.log(`Cabeçalho encontrado na linha ${i}, coluna ${j}: "${celula}"`);
                            return i;
                        }
                    }
                }
            }
            
            console.log("Cabeçalho não encontrado, usando linha 0");
            return 0;
        }

        // VERIFICAR SE É COLUNA IDENTIFICADOR (NÃO DEVE FORMATAR)
        function colunaEhIdentificador(textoCabecalho) {
            if (!textoCabecalho) return false;
            
            const texto = textoCabecalho.toString().toUpperCase().trim();
            
            // Remove acentos para comparação
            const textoSemAcento = texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            
            return COLUNAS_IDENTIFICADOR.some(palavra => {
                const palavraSemAcento = palavra.toString().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                return textoSemAcento.includes(palavraSemAcento) || texto.includes(palavra);
            });
        }

        // VERIFICAR SE VALOR PARECE SER IDENTIFICADOR (Nº, CPF, etc)
        function valorPareceIdentificador(valor) {
            if (!valor) return false;
            
            const str = valor.toString().trim();
            
            // Padrões de identificadores comuns
            const padroes = [
                /^\d{11}$/,           // CPF (11 dígitos)
                /^\d{14}$/,            // CNPJ (14 dígitos)
                /^\d{3}\.\d{3}\.\d{3}-\d{2}$/, // CPF formatado
                /^\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}$/, // CNPJ formatado
                /^\d{8}$/,              // Nº cartão simples
                /^[A-Z0-9]{4,10}$/i,    // Códigos alfanuméricos
                /^\d{1,3}$/             // Números pequenos (provavelmente Nº)
            ];
            
            return padroes.some(padrao => padrao.test(str));
        }

        // FORMATAR NÚMERO NO PADRÃO BRASILEIRO (1.234,56) - APENAS PARA VALORES
        function formatarNumeroBR(valor) {
            if (valor === null || valor === undefined || valor === '') return '';
            
            // Tenta converter para número
            let numero;
            if (typeof valor === 'number') {
                numero = valor;
            } else {
                const strValor = valor.toString().replace(',', '.').replace(/[^\d.-]/g, '');
                numero = parseFloat(strValor);
            }
            
            if (isNaN(numero)) return valor;
            
            // Formata com 2 casas decimais
            return numero.toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        // PROCESSAR E CRIAR TABELA
        function processarEExibirTabela(dados) {
            if (!dados || dados.length === 0) {
                container.innerHTML = '<div class="mensagem-inicial">⚠️ Planilha vazia</div>';
                return;
            }

            // Localiza linha do cabeçalho
            const linhaCabecalho = localizarLinhaCabecalho(dados);
            
            console.log(`Linha do cabeçalho: ${linhaCabecalho}`);
            
            // Pega cabeçalho
            const cabecalho = dados[linhaCabecalho] || [];
            
            // Identifica quais colunas são identificadores (não formatar)
            const colunasIdentificador = [];
            cabecalho.forEach((texto, index) => {
                if (colunaEhIdentificador(texto)) {
                    colunasIdentificador.push(index);
                }
            });
            
            console.log("Colunas identificador (não formatar):", colunasIdentificador);
            
            // Cria tabela
            const tabela = document.createElement("table");
            
            // CABEÇALHO
            const thead = document.createElement("thead");
            const trHead = document.createElement("tr");
            
            cabecalho.forEach((texto, index) => {
                const th = document.createElement("th");
                th.textContent = texto || `Coluna ${index + 1}`;
                th.setAttribute('data-coluna', index);
                
                // Handle para redimensionar
                const handle = document.createElement("div");
                handle.className = "resize-handle";
                handle.addEventListener("mousedown", (e) => iniciarRedimensionamento(e, th));
                
                th.appendChild(handle);
                trHead.appendChild(th);
            });
            
            thead.appendChild(trHead);
            tabela.appendChild(thead);
            
            // CORPO DA TABELA
            const tbody = document.createElement("tbody");
            
            for (let i = linhaCabecalho + 1; i < dados.length; i++) {
                const linha = dados[i];
                
                // Pula linhas vazias
                if (!linha || linha.every(celula => celula === undefined || celula === null || celula === '')) {
                    continue;
                }
                
                const tr = document.createElement("tr");
                
                cabecalho.forEach((_, index) => {
                    const valor = linha[index] !== undefined ? linha[index] : '';
                    const td = document.createElement("td");
                    
                    // Verifica se esta coluna é identificador (NÃO deve formatar)
                    if (colunasIdentificador.includes(index)) {
                        // Coluna identificador - mostrar como texto puro
                        td.classList.add("identificador");
                        td.textContent = valor;
                    } 
                    // Verifica se é valor numérico para formatar
                    else if (typeof valor === 'number') {
                        // É número, verifica se parece identificador
                        if (valorPareceIdentificador(valor) || Number.isInteger(valor) && valor < 1000000) {
                            // Parece identificador (código, CPF, etc) - não formata
                            td.classList.add("identificador");
                            td.textContent = valor;
                        } else {
                            // Parece valor monetário - formata
                            td.classList.add("valor-moeda");
                            td.textContent = formatarNumeroBR(valor);
                        }
                    } 
                    else if (typeof valor === 'string' && valor.trim() !== '') {
                        // Tenta detectar se é número na string
                        const strLimpa = valor.replace(/[R$\s.]/g, '').replace(',', '.');
                        
                        if (!isNaN(strLimpa) && strLimpa !== '') {
                            const numero = parseFloat(strLimpa);
                            
                            // Verifica se parece identificador
                            if (valorPareceIdentificador(valor) || Number.isInteger(numero) && numero < 1000000) {
                                // Parece identificador - mostra original
                                td.classList.add("identificador");
                                td.textContent = valor;
                            } else {
                                // Parece valor - formata
                                td.classList.add("valor-moeda");
                                td.textContent = formatarNumeroBR(numero);
                            }
                        } else {
                            // Texto normal
                            td.textContent = valor;
                        }
                    } else {
                        // Vazio ou null
                        td.textContent = '';
                    }
                    
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            }
            
            tabela.appendChild(tbody);
            
            // Atualiza container
            container.innerHTML = '';
            container.appendChild(tabela);
            
            console.log("Tabela gerada com sucesso!");
        }

        // FUNÇÕES DE REDIMENSIONAMENTO
        function iniciarRedimensionamento(evento, elemento) {
            evento.preventDefault();
            
            colunaAtual = elemento;
            mouseXInicial = evento.pageX;
            larguraInicial = elemento.offsetWidth;
            
            // Adiciona listeners
            document.addEventListener("mousemove", duranteRedimensionamento);
            document.addEventListener("mouseup", pararRedimensionamento);
            
            // Muda cursor global
            document.body.style.cursor = "col-resize";
        }

        function duranteRedimensionamento(evento) {
            if (!colunaAtual) return;
            
            const diffX = evento.pageX - mouseXInicial;
            const novaWidth = Math.max(50, larguraInicial + diffX);
            
            colunaAtual.style.width = novaWidth + "px";
        }

        function pararRedimensionamento() {
            document.removeEventListener("mousemove", duranteRedimensionamento);
            document.removeEventListener("mouseup", pararRedimensionamento);
            document.body.style.cursor = "";
            colunaAtual = null;
        }

        // Torna função global para acesso pelo onclick
        window.carregarPNAE = carregarPNAE;
    </script>
</body>
</html>
