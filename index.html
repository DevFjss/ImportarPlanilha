<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>FAED - Visualizador</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#667eea;
}

.sidebar{
width:260px;
background:#2c2c2c;
color:white;
padding:20px;
}

.logo{
font-size:22px;
margin-bottom:20px;
}

.menu-item{
display:block;
width:100%;
padding:12px;
margin:6px 0;
border:none;
background:none;
color:white;
cursor:pointer;
text-align:left;
font-size:15px;
}

.menu-item:hover{
background:#444;
}

.main-content{
flex:1;
padding:20px;
background:#f5f5f5;
overflow:auto;
}

.table-container{
background:white;
border-radius:10px;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#667eea;
color:white;
padding:10px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #ccc;
}

tr:hover{
background:#f2f2f2;
}

</style>

</head>

<body>

<!-- MENU -->

<div class="sidebar">

<div class="logo">
<i class="fas fa-graduation-cap"></i> FAED
</div>

<button class="menu-item" onclick="carregarPNAE()">
<i class="fas fa-book-open"></i> PNAE
</button>

</div>

<!-- AREA DIREITA -->

<div class="main-content">

<h2>PNAE</h2>

<div class="table-container">

<div id="tabela-container">
Clique em PNAE para carregar a planilha
</div>

</div>

</div>

<script>

const URL_PLANILHA =
"https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_PNAE_2026.xlsx";

const container =
document.getElementById("tabela-container");

async function carregarPNAE(){

container.innerHTML="Carregando planilha...";

try{

const resposta =
await fetch(URL_PLANILHA);

const data =
await resposta.arrayBuffer();

const workbook =
XLSX.read(data);

const sheet =
workbook.Sheets[workbook.SheetNames[0]];

const dados =
XLSX.utils.sheet_to_json(sheet,{header:1});

gerarTabela(dados);

}catch(erro){

container.innerHTML="Erro ao carregar planilha";

console.log(erro);

}

}

function gerarTabela(dados){

const tabela =
document.createElement("table");

const thead =
document.createElement("thead");

const trHead =
document.createElement("tr");

dados[0].forEach(coluna=>{

const th =
document.createElement("th");

th.textContent = coluna;

trHead.appendChild(th);

});

thead.appendChild(trHead);

tabela.appendChild(thead);

const tbody =
document.createElement("tbody");

for(let i=1;i<dados.length;i++){

const tr =
document.createElement("tr");

dados[i].forEach(valor=>{

const td =
document.createElement("td");

td.textContent = valor;

tr.appendChild(td);

});

tbody.appendChild(tr);

}

tabela.appendChild(tbody);

container.innerHTML="";

container.appendChild(tabela);

}

</script>

</body>
</html>
