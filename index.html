<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAED - Visualizador de Planilhas</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #f0f4fc;
            overflow: hidden;
        }

        /* MENU LATERAL - AJUSTADO */
        .sidebar {
            width: 280px;
            background: #0a3a9e;
            color: white;
            padding: 25px 15px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            padding-left: 8px;
            border-left: 4px solid #ffd700;
        }

        .menu-item {
            width: 100%;
            padding: 12px 15px;
            margin: 5px 0;
            border: none;
            background: #1e4fc4;
            color: white;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .menu-item:hover {
            background: #2f66e0;
            transform: translateX(3px);
        }

        /* AREA PRINCIPAL */
        .main-content {
            flex: 1;
            padding: 25px;
            overflow: auto;
            height: 100vh;
        }

        .main-content h2 {
            color: #0a3a9e;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 600;
        }

        /* CONTAINER DA TABELA */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            overflow: auto;
            max-height: calc(100vh - 140px);
        }

        /* TABELA */
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
            table-layout: auto;
        }

        /* CABEÇALHO AZUL */
        th {
            background: #0a3a9e;
            color: white;
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            position: relative;
            user-select: none;
            white-space: nowrap;
            border-right: 1px solid #2f66e0;
        }

        th:last-child {
            border-right: none;
        }

        /* LINHAS */
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e7f0;
            white-space: nowrap;
        }

        /* COLUNAS DE VALORES - FORMATO BR */
        td.valor {
            background: #f0f6ff;
            text-align: right;
            font-weight: 600;
            color: #0a3a9e;
            font-family: 'Courier New', monospace;
        }

        /* COLUNAS IDENTIFICADOR - SEM FORMATAÇÃO */
        td.identificador {
            text-align: left;
            font-weight: 400;
            color: #333;
        }

        /* LINHAS ALTERNADAS */
        tbody tr:nth-child(even) {
            background: #f8faff;
        }

        tbody tr:hover {
            background: #e8f0fe;
        }

        /* RESIZE HANDLE */
        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
            z-index: 10;
        }

        .resize-handle:hover,
        .resize-handle:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* MENSAGEM INICIAL */
        .mensagem-inicial {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 18px;
            background: #f5f9ff;
            border-radius: 10px;
            border: 2px dashed #0a3a9e;
        }

        .carregando {
            text-align: center;
            padding: 40px;
            color: #0a3a9e;
            font-size: 18px;
            font-weight: 500;
        }
        
        .sidebar div:last-child {
            margin-top: auto;
            font-size: 11px;
            opacity: 0.6;
            padding: 15px 5px;
        }
    </style>
</head>
<body>
    <!-- MENU LATERAL -->
    <div class="sidebar">
        <div class="logo">
            📊 FAED
        </div>
        
        <button class="menu-item" onclick="carregarPNAE()">
            📁 PNAE 2026
        </button>
        
        <button class="menu-item" onclick="carregarFAED()">
            📁 FAED 2026
        </button>
        
        <button class="menu-item" onclick="carregarMANUTENCAO()">
            🔧 Gerador manutenção 2026
        </button>
        
        <div>
            Clique para carregar a planilha<br>
            Arraste as bordas para redimensionar
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">
        <h2>📋 Visualizador de Planilhas</h2>
        
        <div class="table-container">
            <div id="tabela-container" class="mensagem-inicial">
                👈 Clique em um menu para carregar a planilha
            </div>
        </div>
    </div>

    <script>
        const URL_PLANILHA_PNAE = "https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_PNAE_2026.xlsx";
        const URL_PLANILHA_FAED = "https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_FAED_2026.xlsx";
        const URL_PLANILHA_MANUTENCAO = "https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/GERADOR_REMESSA_CARTÃO_MANUTENÇÃO_2026.xlsm";
        
        const container = document.getElementById("tabela-container");

        // Variáveis para redimensionamento
        let colunaAtual = null;
        let mouseXInicial = 0;
        let larguraInicial = 0;

        // FUNÇÃO PRINCIPAL PARA VERIFICAR SE É COLUNA IDENTIFICADOR
        function colunaEhIdentificador(textoCabecalho) {
            if (!textoCabecalho) return false;
            
            // Converte para maiúsculo e remove acentos
            const texto = textoCabecalho.toString()
                .toUpperCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim();
            
            // Verifica se contém palavras-chave de identificador
            if (texto.includes('Nº') || 
                texto.includes('NTE') || 
                texto.includes('CPF') ||
                texto.includes('CARTAO')) {
                return true;
            }
            
            // Para códigos (COD, SEC, INEP)
            if (texto.includes('COD') || texto.includes('CODIGO')) {
                if (texto.includes('SEC') || texto.includes('INEP')) {
                    return true;
                }
            }
            
            return false;
        }

        // LOCALIZAR LINHA DO CABEÇALHO
        function localizarLinhaCabecalho(dados) {
            for (let i = 0; i < Math.min(30, dados.length); i++) {
                const linha = dados[i] || [];
                
                for (let j = 0; j < linha.length; j++) {
                    const celula = linha[j];
                    
                    if (celula && typeof celula === 'string') {
                        const texto = celula.toString().toUpperCase().trim();
                        
                        if (texto.includes('NTE') || 
                            texto.includes('Nº') || 
                            texto.includes('CODIGO') || 
                            texto.includes('CPF') ||
                            texto.includes('MUNICIPIO')) {
                            return i;
                        }
                    }
                }
            }
            return 0;
        }

        // FORMATAR NÚMERO NO PADRÃO BRASILEIRO
        function formatarNumeroBR(valor) {
            if (valor === null || valor === undefined) return '';
            
            const numero = Number(valor);
            if (isNaN(numero)) return valor;
            
            return numero.toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        // PROCESSAR E CRIAR TABELA
        function processarEExibirTabela(dados, titulo = 'Visualizador') {
            if (!dados || dados.length === 0) {
                container.innerHTML = '<div class="mensagem-inicial">⚠️ Planilha vazia</div>';
                return;
            }

            // Localiza cabeçalho
            const linhaCabecalho = localizarLinhaCabecalho(dados);
            const cabecalho = dados[linhaCabecalho] || [];
            
            // Identifica colunas que NÃO devem ser formatadas (identificadores)
            const colunasIdentificador = [];
            cabecalho.forEach((texto, index) => {
                if (colunaEhIdentificador(texto)) {
                    colunasIdentificador.push(index);
                }
            });
            
            // Cria tabela
            const tabela = document.createElement("table");
            
            // CABEÇALHO
            const thead = document.createElement("thead");
            const trHead = document.createElement("tr");
            
            cabecalho.forEach((texto, index) => {
                const th = document.createElement("th");
                th.textContent = texto || `Coluna ${index + 1}`;
                th.style.width = '150px';
                th.setAttribute('data-coluna', index);
                
                // Handle para redimensionar
                const handle = document.createElement("div");
                handle.className = "resize-handle";
                handle.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    iniciarRedimensionamento(e, th);
                });
                
                th.appendChild(handle);
                trHead.appendChild(th);
            });
            
            thead.appendChild(trHead);
            tabela.appendChild(thead);
            
            // CORPO DA TABELA
            const tbody = document.createElement("tbody");
            
            for (let i = linhaCabecalho + 1; i < dados.length; i++) {
                const linha = dados[i];
                
                if (!linha || linha.every(celula => celula === undefined || celula === '')) {
                    continue;
                }
                
                const tr = document.createElement("tr");
                
                cabecalho.forEach((_, index) => {
                    const valor = linha[index] !== undefined ? linha[index] : '';
                    const td = document.createElement("td");
                    
                    // SE É COLUNA IDENTIFICADOR (Nº, NTE, COD SEC, etc)
                    if (colunasIdentificador.includes(index)) {
                        td.classList.add("identificador");
                        
                        // Remove TODOS os pontos do número
                        if (valor !== null && valor !== undefined) {
                            td.textContent = valor.toString().replace(/\./g, '');
                        } else {
                            td.textContent = '';
                        }
                    } 
                    // SE É NÚMERO E NÃO É IDENTIFICADOR → formata como valor
                    else if (typeof valor === 'number') {
                        td.classList.add("valor");
                        td.textContent = formatarNumeroBR(valor);
                    }
                    else {
                        td.textContent = valor;
                    }
                    
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            }
            
            tabela.appendChild(tbody);
            
            // Atualiza container e título
            container.innerHTML = '';
            container.appendChild(tabela);
            document.querySelector('.main-content h2').textContent = `📋 ${titulo}`;
        }

        // FUNÇÕES DE REDIMENSIONAMENTO
        function iniciarRedimensionamento(e, elemento) {
            colunaAtual = elemento;
            mouseXInicial = e.pageX;
            larguraInicial = elemento.offsetWidth;
            
            document.addEventListener("mousemove", duranteRedimensionamento);
            document.addEventListener("mouseup", pararRedimensionamento);
            
            document.body.style.cursor = "col-resize";
        }

        function duranteRedimensionamento(e) {
            if (!colunaAtual) return;
            
            const diffX = e.pageX - mouseXInicial;
            const novaWidth = Math.max(80, larguraInicial + diffX);
            
            colunaAtual.style.width = novaWidth + 'px';
        }

        function pararRedimensionamento() {
            document.removeEventListener("mousemove", duranteRedimensionamento);
            document.removeEventListener("mouseup", pararRedimensionamento);
            document.body.style.cursor = "";
            colunaAtual = null;
        }

        // FUNÇÕES PARA CARREGAR PLANILHAS
        async function carregarPNAE() {
            try {
                container.innerHTML = '<div class="carregando">🔄 Carregando PNAE 2026...</div>';
                
                const resposta = await fetch(URL_PLANILHA_PNAE);
                
                if (!resposta.ok) {
                    throw new Error("Erro ao carregar PNAE");
                }
                
                const buffer = await resposta.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                const primeiraAba = workbook.SheetNames[0];
                const sheet = workbook.Sheets[primeiraAba];
                
                const dados = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                
                processarEExibirTabela(dados, 'PNAE 2026');
                
            } catch (erro) {
                container.innerHTML = `<div class="mensagem-inicial" style="color: #d32f2f;">
                    ❌ Erro: ${erro.message}
                </div>`;
            }
        }

        async function carregarFAED() {
            try {
                container.innerHTML = '<div class="carregando">🔄 Carregando FAED 2026...</div>';
                
                const resposta = await fetch(URL_PLANILHA_FAED);
                
                if (!resposta.ok) {
                    throw new Error("Erro ao carregar FAED");
                }
                
                const buffer = await resposta.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                const primeiraAba = workbook.SheetNames[0];
                const sheet = workbook.Sheets[primeiraAba];
                
                const dados = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                
                processarEExibirTabela(dados, 'FAED 2026');
                
            } catch (erro) {
                container.innerHTML = `<div class="mensagem-inicial" style="color: #d32f2f;">
                    ❌ Erro: ${erro.message}
                </div>`;
            }
        }

        async function carregarMANUTENCAO() {
            try {
                container.innerHTML = '<div class="carregando">🔄 Carregando Manutenção 2026 (Backup_Remessa)...</div>';
                
                const resposta = await fetch(URL_PLANILHA_MANUTENCAO);
                
                if (!resposta.ok) {
                    throw new Error("Erro ao carregar Manutenção");
                }
                
                const buffer = await resposta.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                
                // Procura pela aba Backup_Remessa
                const nomeAbaDesejada = workbook.SheetNames.find(nome => 
                    nome.toUpperCase().includes('BACKUP') || 
                    nome.toUpperCase().includes('REMESSA')
                ) || workbook.SheetNames[0];
                
                const sheet = workbook.Sheets[nomeAbaDesejada];
                const dados = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                
                processarEExibirTabela(dados, `Manutenção - ${nomeAbaDesejada}`);
                
            } catch (erro) {
                container.innerHTML = `<div class="mensagem-inicial" style="color: #d32f2f;">
                    ❌ Erro: ${erro.message}
                </div>`;
            }
        }

        // Tornar funções globais
        window.carregarPNAE = carregarPNAE;
        window.carregarFAED = carregarFAED;
        window.carregarMANUTENCAO = carregarMANUTENCAO;
    </script>
</body>
</html>
