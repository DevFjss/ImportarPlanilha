<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>FAED - Visualizador</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#f2f5ff;
}

/* MENU */

.sidebar{
width:300px;
background:#0d47a1;
color:white;
padding:25px;
}

.logo{
font-size:22px;
margin-bottom:30px;
}

.menu-item{
display:block;
width:100%;
padding:14px;
margin:8px 0;
border:none;
background:none;
color:white;
cursor:pointer;
text-align:left;
font-size:16px;
border-radius:6px;
}

.menu-item:hover{
background:#1565c0;
}

/* CONTEUDO */

.main-content{
flex:1;
padding:20px;
overflow:auto;
}

/* TABELA */

.table-container{
background:white;
border-radius:10px;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1976d2;
color:white;
padding:10px;
position:relative;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

tr:nth-child(even){
background:#f7f7f7;
}

/* RESIZE */

.resize-handle{
position:absolute;
right:0;
top:0;
width:6px;
height:100%;
cursor:col-resize;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<i class="fas fa-school"></i> FAED
</div>

<button class="menu-item" onclick="carregarPlanilha()">
<i class="fas fa-book-open"></i> PNAE
</button>

</div>

<div class="main-content">

<h2>PNAE</h2>

<div class="table-container">

<div id="tabela-container">
Clique em PNAE para carregar a planilha
</div>

</div>

</div>

<script>

const URL_PLANILHA =
"https://raw.githubusercontent.com/DevFjss/ImportarPlanilha/main/SALDO_DISPONIVEL_CARTÃO_PNAE_2026.xlsx";

const container =
document.getElementById("tabela-container");

async function carregarPlanilha(){

container.innerHTML="Carregando planilha...";

const resposta = await fetch(URL_PLANILHA);

const data = await resposta.arrayBuffer();

const workbook = XLSX.read(data);

const sheet = workbook.Sheets[workbook.SheetNames[0]];

const dados = XLSX.utils.sheet_to_json(sheet,{header:1});

gerarTabela(dados);

}

/* LOCALIZAR LINHA CABEÇALHO */

function localizarCabecalho(dados){

for(let i=0;i<dados.length;i++){

for(let j=0;j<dados[i].length;j++){

if(dados[i][j] && dados[i][j].toString().toUpperCase().includes("NTE")){

return i;

}

}

}

return 0;

}

/* FORMATAR NUMERO BR */

function formatarBR(valor){

if(typeof valor === "number"){

return valor.toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

}

return valor;

}

/* GERAR TABELA */

function gerarTabela(dados){

const linhaCabecalho = localizarCabecalho(dados);

const tabela = document.createElement("table");

const thead = document.createElement("thead");

const trHead = document.createElement("tr");

dados[linhaCabecalho].forEach(col=>{

const th = document.createElement("th");

th.textContent = col;

/* resize */

const resize = document.createElement("div");

resize.className="resize-handle";

resize.addEventListener("mousedown",initResize);

th.appendChild(resize);

trHead.appendChild(th);

});

thead.appendChild(trHead);

tabela.appendChild(thead);

const tbody = document.createElement("tbody");

for(let i=linhaCabecalho+1;i<dados.length;i++){

const tr = document.createElement("tr");

dados[i].forEach(valor=>{

const td = document.createElement("td");

td.textContent = formatarBR(valor);

tr.appendChild(td);

});

tbody.appendChild(tr);

}

tabela.appendChild(tbody);

container.innerHTML="";

container.appendChild(tabela);

}

/* REDIMENSIONAR COLUNAS */

let col;
let startX;
let startWidth;

function initResize(e){

col = e.target.parentElement;

startX = e.pageX;

startWidth = col.offsetWidth;

document.addEventListener("mousemove",resizeCol);

document.addEventListener("mouseup",stopResize);

}

function resizeCol(e){

col.style.width = startWidth + (e.pageX - startX) + "px";

}

function stopResize(){

document.removeEventListener("mousemove",resizeCol);

document.removeEventListener("mouseup",stopResize);

}

</script>

</body>
</html>
